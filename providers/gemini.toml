# gemini.toml — reference manifest for the `gemini` coding agent
# (PRD §12.5, external_deps §B.3/§C.3, Appendix E.1).
#
# Contributor-facing COPY of the manifest compiled into the binary by
# internal/provider/builtin.go (P1.M2.T3.S1). The tool works with zero config
# because the built-in is the source of truth; this file is for reference and
# copy-paste when authoring a [provider.gemini] override (PRD §12.8).
#
# TO-CONFIRM (Appendix E.1, real run 2026-07-03): prompt delivery — positional is
# the current default; stdin is preferred-if-verified at integration time. The
# host's `gemini` CLI is DEPRECATED (exit 55, "migrate to Antigravity") and
# refuses headless runs (untrusted directory), so the stdin-vs-positional
# question could NOT be exercised. KEEP `positional` + the 300 KB diff cap
# (FR3); confirm in an environment with a functional, trusted gemini CLI. The
# `-p` flag is DEPRECATED and must NOT be used, so print_flag is omitted. There
# is no system_prompt_flag: the system prompt is prepended to the payload
# instead. See external_deps §B.3.
name = "gemini"
detect = "gemini"
command = "gemini"
prompt_delivery = "positional"   # payload appended as the final positional arg
model_flag = "-m"
default_model = "gemini-2.5-pro"
bare_flags = [
  "--approval-mode",
  "default",
]
output = "raw"
strip_code_fence = true
